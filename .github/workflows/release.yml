name: specx-cli release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: build macOS universal
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Package binaries
        run: |
          set -euo pipefail
          BIN=".build/release/specx"
          test -f "$BIN"
          mkdir -p dist
          cp "$BIN" dist/specx-macos
          (cd dist && shasum -a 256 specx-macos > specx-macos.sha256)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/specx-macos
            dist/specx-macos.sha256
