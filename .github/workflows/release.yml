name: specx-cli release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Build (Release)
        run: |
          swift build -c release

      - name: Package artifact
        run: |
          BIN=".build/release/specx"
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            ls -la .build/release || true
            exit 1
          fi

          TAG="${GITHUB_REF_NAME}"
          OUTDIR="dist"
          mkdir -p "$OUTDIR"

          # Determine arch
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ARCH="arm64"
          else
            ARCH="x86_64"
          fi

          # Ensure executable
          chmod +x "$BIN"

          # Create tar.gz
          PKG="specx-${TAG}-macos-${ARCH}.tar.gz"
          tar -czf "${OUTDIR}/${PKG}" -C .build/release specx

          # sha256
          shasum -a 256 "${OUTDIR}/${PKG}" > "${OUTDIR}/${PKG}.sha256"

      - name: Upload to release (artifacts)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
